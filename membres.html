<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIELF Admin — Membres</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --teal:#13686b; --wine:#861b3f; --purple:#ccadb5; --cream:#fafaf2; --cyan:#82adad; --dark:#2c2c2c; --mid:#666; --sidebar-w:240px; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Nunito',sans-serif; background:var(--cream); color:var(--dark); min-height:100vh; }

    /* ── SIDEBAR (styles partagés — ne pas modifier) ── */
    .sidebar { position:fixed; top:0; left:0; width:var(--sidebar-w); height:100vh; background:var(--teal); display:flex; flex-direction:column; z-index:100; overflow-y:auto; }
    .sidebar-logo { padding:28px 24px 20px; border-bottom:1px solid rgba(255,255,255,0.15); }
    .sidebar-logo img { height:40px; }
    .sidebar-badge { display:block; margin-top:8px; font-size:10px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,255,255,0.7); }
    .sidebar-user { padding:16px 24px; border-bottom:1px solid rgba(255,255,255,0.15); }
    .sidebar-user-nom { font-size:13px; font-weight:700; color:#fff; }
    .sidebar-user-role { font-size:11px; color:rgba(255,255,255,0.6); margin-top:2px; }
    .sidebar-nav { flex:1; padding:16px 0; }
    .nav-section { padding:8px 24px 4px; font-size:10px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,255,255,0.45); }
    .nav-item { display:flex; align-items:center; gap:10px; padding:10px 24px; font-size:14px; font-weight:600; color:rgba(255,255,255,0.85); text-decoration:none; transition:background 0.15s; cursor:pointer; border:none; background:none; width:100%; text-align:left; }
    .nav-item:hover { background:rgba(255,255,255,0.1); color:#fff; }
    .nav-item.active { background:rgba(255,255,255,0.18); color:#fff; font-weight:800; }
    .nav-icon { font-size:16px; width:20px; text-align:center; }
    .nav-item-disabled { opacity:0.4; cursor:not-allowed; pointer-events:none; }
    .nav-soon { margin-left:auto; font-size:9px; font-weight:700; color:rgba(255,255,255,0.5); }
    .sidebar-bottom { padding:16px 24px; border-top:1px solid rgba(255,255,255,0.15); }
    .btn-deconnexion { width:100%; padding:10px; background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.8); border:1px solid rgba(255,255,255,0.2); border-radius:8px; font-family:'Nunito',sans-serif; font-size:13px; font-weight:700; cursor:pointer; }
    .btn-deconnexion:hover { background:rgba(255,255,255,0.2); color:#fff; }

    /* ── LAYOUT ── */
    .main { margin-left:var(--sidebar-w); min-height:100vh; padding:32px; }
    .main-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:28px; }
    .main-header h1 { font-size:22px; font-weight:800; color:var(--teal); }
    .search-bar { width:100%; max-width:360px; padding:10px 14px; border:1.5px solid #ddd; border-radius:8px; font-family:'Nunito',sans-serif; font-size:14px; color:var(--dark); outline:none; }
    .search-bar:focus { border-color:var(--teal); box-shadow:0 0 0 3px rgba(19,104,107,0.12); }

    /* ── TABLE ── */
    .membres-table { width:100%; background:#fff; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.06); overflow:hidden; border-collapse:collapse; }
    .membres-table th { background:var(--teal); color:#fff; padding:12px 16px; font-size:12px; font-weight:800; text-align:left; }
    .membres-table td { padding:12px 16px; font-size:13px; border-bottom:1px solid #f0f0f0; vertical-align:middle; }
    .membres-table tr:last-child td { border-bottom:none; }
    .membres-table tr.membre-row { cursor:pointer; }
    .membres-table tr.membre-row:hover td { background:#f0faf9; }
    .membre-nom { font-weight:800; color:var(--dark); }
    .membre-email { font-size:12px; color:var(--mid); }
    .badge-fondateur { display:inline-block; font-size:9px; font-weight:800; padding:2px 7px; border-radius:6px; background:#fff8e1; color:#c47a1e; margin-left:4px; }
    .select-membership { padding:6px 10px; border:1.5px solid #ddd; border-radius:6px; font-family:'Nunito',sans-serif; font-size:12px; font-weight:700; cursor:pointer; }
    .select-membership:focus { outline:none; border-color:var(--teal); }
    .btn-toggle-actif { padding:5px 12px; border-radius:6px; font-family:'Nunito',sans-serif; font-size:11px; font-weight:700; cursor:pointer; border:1.5px solid; }
    .btn-actif   { background:#f0faf0; color:#2e7d32; border-color:#2e7d32; }
    .btn-inactif { background:#fce4ec; color:var(--wine); border-color:var(--wine); }

    /* ── MODALE ── */
    .modale-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:300; align-items:center; justify-content:center; }
    .modale-overlay.open { display:flex; }
    .modale { background:#fff; border-radius:14px; width:100%; max-width:620px; max-height:90vh; overflow-y:auto; padding:32px; position:relative; box-shadow:0 8px 40px rgba(0,0,0,0.18); }
    .modale-titre { font-size:18px; font-weight:800; color:var(--teal); margin-bottom:24px; }
    .modale-fermer { position:absolute; top:16px; right:18px; background:none; border:none; font-size:20px; color:var(--mid); cursor:pointer; line-height:1; }
    .modale-fermer:hover { color:var(--dark); }
    .form-grille { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .form-grille .full { grid-column:1 / -1; }
    .form-group { display:flex; flex-direction:column; gap:5px; }
    .form-label { font-size:11px; font-weight:800; color:var(--teal); text-transform:uppercase; letter-spacing:0.6px; }
    .form-input, .form-textarea { padding:9px 12px; border:1.5px solid #ddd; border-radius:7px; font-family:'Nunito',sans-serif; font-size:13px; color:var(--dark); outline:none; transition:border-color 0.2s; }
    .form-input:focus, .form-textarea:focus { border-color:var(--teal); }
    .form-textarea { resize:vertical; min-height:80px; }
    .modale-actions { display:flex; gap:10px; margin-top:24px; justify-content:flex-end; flex-wrap:wrap; }
    .btn-enregistrer { padding:10px 22px; background:var(--teal); color:#fff; border:none; border-radius:8px; font-family:'Nunito',sans-serif; font-size:14px; font-weight:800; cursor:pointer; }
    .btn-enregistrer:hover { background:#0e5053; }
    .btn-annuler { padding:10px 18px; background:none; color:var(--mid); border:1.5px solid #ddd; border-radius:8px; font-family:'Nunito',sans-serif; font-size:14px; font-weight:700; cursor:pointer; }
    .btn-annuler:hover { border-color:var(--dark); color:var(--dark); }
    .btn-archiver { padding:10px 18px; background:none; color:var(--wine); border:1.5px solid var(--wine); border-radius:8px; font-family:'Nunito',sans-serif; font-size:14px; font-weight:700; cursor:pointer; margin-right:auto; }
    .btn-archiver:hover { background:#fce4ec; }

    /* ── ÉTATS ── */
    .menu-toggle { display:none; position:fixed; top:16px; left:16px; z-index:200; background:var(--teal); color:#fff; border:none; border-radius:8px; width:40px; height:40px; font-size:20px; cursor:pointer; align-items:center; justify-content:center; }
    .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:99; }
    @media (max-width:768px) {
      .menu-toggle { display:flex; }
      .sidebar { transform:translateX(-100%); transition:transform 0.25s; }
      .sidebar.open { transform:translateX(0); }
      .sidebar-overlay.open { display:block; }
      .main { margin-left:0; padding:72px 16px 24px; }
      .membres-table th:nth-child(3), .membres-table td:nth-child(3),
      .membres-table th:nth-child(4), .membres-table td:nth-child(4) { display:none; }
      .form-grille { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

  <button class="menu-toggle" id="menu-toggle">☰</button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Sidebar chargée dynamiquement depuis sidebar.html -->
  <div id="sidebar-container"></div>

  <main class="main">
    <div class="main-header">
      <h1>👥 Membres <span id="count-membres" style="font-size:16px;color:var(--mid);font-weight:600;"></span></h1>
      <input type="text" class="search-bar" id="search-membres" placeholder="🔍 Rechercher par nom, email, pays...">
    </div>
    <table class="membres-table" id="membres-table">
      <thead>
        <tr>
          <th>Membre</th>
          <th>Membership</th>
          <th>Pays</th>
          <th>Depuis</th>
          <th>Statut</th>
        </tr>
      </thead>
      <tbody id="membres-tbody">
        <tr><td colspan="5" style="text-align:center;padding:40px;color:var(--mid);">Chargement...</td></tr>
      </tbody>
    </table>
  </main>

  <!-- Modale édition membre -->
  <div class="modale-overlay" id="modale-overlay">
    <div class="modale">
      <button class="modale-fermer" id="modale-fermer">✕</button>
      <div class="modale-titre" id="modale-titre">Modifier le membre</div>
      <div class="form-grille">
        <div class="form-group">
          <label class="form-label">Prénom</label>
          <input class="form-input" id="m-prenom" type="text">
        </div>
        <div class="form-group">
          <label class="form-label">Nom</label>
          <input class="form-input" id="m-nom" type="text">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" id="m-email" type="email">
        </div>
        <div class="form-group">
          <label class="form-label">Téléphone</label>
          <input class="form-input" id="m-telephone" type="text">
        </div>
        <div class="form-group">
          <label class="form-label">Pays</label>
          <input class="form-input" id="m-pays" type="text">
        </div>
        <div class="form-group">
          <label class="form-label">Ville</label>
          <input class="form-input" id="m-ville" type="text">
        </div>
        <div class="form-group">
          <label class="form-label">Entreprise</label>
          <input class="form-input" id="m-nomEntreprise" type="text">
        </div>
        <div class="form-group">
          <label class="form-label">Secteur</label>
          <input class="form-input" id="m-secteur" type="text">
        </div>
        <div class="form-group">
          <label class="form-label">Site web</label>
          <input class="form-input" id="m-siteWeb" type="url">
        </div>
        <div class="form-group">
          <label class="form-label">LinkedIn</label>
          <input class="form-input" id="m-linkedin" type="url">
        </div>
        <div class="form-group full">
          <label class="form-label">Bio</label>
          <textarea class="form-textarea" id="m-bio"></textarea>
        </div>
      </div>
      <div class="modale-actions">
        <button class="btn-archiver" id="btn-archiver">Archiver ce membre</button>
        <button class="btn-annuler" id="btn-annuler">Annuler</button>
        <button class="btn-enregistrer" id="btn-enregistrer">Enregistrer</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { requireAdmin, db }        from "./cielf-admin-auth.js";
    import { chargerSidebar, majSidebarUser } from "./cielf-sidebar.js";
    import { collection, getDocs, doc, updateDoc, query, orderBy, where }
      from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ── Sidebar ──────────────────────────────────────────────
    await chargerSidebar();

    // ── État ─────────────────────────────────────────────────
    let tousMembres   = [];
    let membreActif   = null; // membre en cours d'édition dans la modale

    // ── Chargement membres ───────────────────────────────────
    async function charger() {
      const tbody = document.getElementById("membres-tbody");
      try {
        // Filtre les membres archivés (deleted: true)
        const snap = await getDocs(query(collection(db, "members"), orderBy("nom", "asc")));
        tousMembres = snap.docs
          .map(d => ({ id: d.id, ...d.data() }))
          .filter(m => !m.deleted);
        document.getElementById("count-membres").textContent = "(" + tousMembres.length + ")";
        afficher(tousMembres);
      } catch (err) {
        tbody.innerHTML = "<tr><td colspan='5' style='text-align:center;padding:40px;color:var(--wine);'>Erreur : " + err.message + "</td></tr>";
      }
    }

    // ── Affichage liste ──────────────────────────────────────
    function afficher(membres) {
      const tbody = document.getElementById("membres-tbody");
      if (membres.length === 0) {
        tbody.innerHTML = "<tr><td colspan='5' style='text-align:center;padding:40px;color:var(--mid);'>Aucun membre trouvé.</td></tr>";
        return;
      }
      tbody.innerHTML = membres.map(m => {
        const dateStr  = m.createdAt?.toDate ? m.createdAt.toDate().toLocaleDateString("fr-BE") : "—";
        const actifCls = m.status === "active" ? "btn-actif" : "btn-inactif";
        const actifLbl = m.status === "active" ? "Actif" : "Inactif";
        return "<tr class='membre-row' data-id='" + m.id + "'>" +
          "<td>" +
            "<div class='membre-nom'>" + (m.prenom || "") + " " + (m.nom || "") +
              (m.isFondateur ? "<span class='badge-fondateur'>Fondateur</span>" : "") + "</div>" +
            "<div class='membre-email'>" + (m.email || "") + "</div>" +
          "</td>" +
          "<td onclick='event.stopPropagation()'>" +
            "<select class='select-membership' onchange='window._changerMembership(\"" + m.id + "\", this.value)'>" +
              "<option value='leadership'" + (m.membershipType === "leadership" ? " selected" : "") + ">Leadership+</option>" +
              "<option value='dynamique'"  + (m.membershipType === "dynamique"  ? " selected" : "") + ">Dynamique</option>" +
            "</select>" +
          "</td>" +
          "<td>" + (m.pays || "—") + "</td>" +
          "<td>" + dateStr + "</td>" +
          "<td onclick='event.stopPropagation()'>" +
            "<button class='btn-toggle-actif " + actifCls + "' onclick='window._toggleActif(\"" + m.id + "\",\"" + m.status + "\")'>" + actifLbl + "</button>" +
          "</td>" +
        "</tr>";
      }).join("");

      // Clic sur une ligne → ouvre la modale
      document.querySelectorAll(".membre-row").forEach(tr => {
        tr.addEventListener("click", () => {
          const id = tr.getAttribute("data-id");
          const m  = tousMembres.find(x => x.id === id);
          if (m) ouvrirModale(m);
        });
      });
    }

    // ── Modale ───────────────────────────────────────────────
    function ouvrirModale(m) {
      membreActif = m;
      document.getElementById("modale-titre").textContent = "Modifier — " + (m.prenom || "") + " " + (m.nom || "");
      document.getElementById("m-prenom").value       = m.prenom       || "";
      document.getElementById("m-nom").value          = m.nom          || "";
      document.getElementById("m-email").value        = m.email        || "";
      document.getElementById("m-telephone").value    = m.telephone    || "";
      document.getElementById("m-pays").value         = m.pays         || "";
      document.getElementById("m-ville").value        = m.ville        || "";
      document.getElementById("m-nomEntreprise").value= m.nomEntreprise|| "";
      document.getElementById("m-secteur").value      = m.secteur      || "";
      document.getElementById("m-siteWeb").value      = m.siteWeb      || "";
      document.getElementById("m-linkedin").value     = m.linkedin     || "";
      document.getElementById("m-bio").value          = m.bio          || "";
      document.getElementById("modale-overlay").classList.add("open");
    }

    function fermerModale() {
      membreActif = null;
      document.getElementById("modale-overlay").classList.remove("open");
    }

    document.getElementById("modale-fermer").addEventListener("click", fermerModale);
    document.getElementById("btn-annuler").addEventListener("click", fermerModale);
    document.getElementById("modale-overlay").addEventListener("click", e => {
      if (e.target === document.getElementById("modale-overlay")) fermerModale();
    });

    // ── Enregistrer ──────────────────────────────────────────
    document.getElementById("btn-enregistrer").addEventListener("click", async () => {
      if (!membreActif) return;
      const btn = document.getElementById("btn-enregistrer");
      btn.textContent = "Enregistrement...";
      btn.disabled = true;
      try {
        await updateDoc(doc(db, "members", membreActif.id), {
          prenom:        document.getElementById("m-prenom").value.trim(),
          nom:           document.getElementById("m-nom").value.trim(),
          email:         document.getElementById("m-email").value.trim(),
          telephone:     document.getElementById("m-telephone").value.trim(),
          pays:          document.getElementById("m-pays").value.trim(),
          ville:         document.getElementById("m-ville").value.trim(),
          nomEntreprise: document.getElementById("m-nomEntreprise").value.trim(),
          secteur:       document.getElementById("m-secteur").value.trim(),
          siteWeb:       document.getElementById("m-siteWeb").value.trim(),
          linkedin:      document.getElementById("m-linkedin").value.trim(),
          bio:           document.getElementById("m-bio").value.trim()
        });
        fermerModale();
        await charger();
      } catch (e) {
        alert("Erreur : " + e.message);
      } finally {
        btn.textContent = "Enregistrer";
        btn.disabled = false;
      }
    });

    // ── Archiver (deleted: true) ─────────────────────────────
    document.getElementById("btn-archiver").addEventListener("click", async () => {
      if (!membreActif) return;
      const nom = (membreActif.prenom || "") + " " + (membreActif.nom || "");
      if (!confirm("Archiver " + nom.trim() + " ?\n\nLe membre ne sera plus visible dans l'admin mais ses données sont conservées.")) return;
      try {
        await updateDoc(doc(db, "members", membreActif.id), { deleted: true });
        fermerModale();
        await charger();
      } catch (e) {
        alert("Erreur : " + e.message);
      }
    });

    // ── Toggle actif/inactif ─────────────────────────────────
    window._toggleActif = async (id, statut) => {
      const nouveau = statut === "active" ? "inactive" : "active";
      try {
        await updateDoc(doc(db, "members", id), { status: nouveau });
        await charger();
      } catch (e) { alert("Erreur : " + e.message); }
    };

    // ── Changer membership ───────────────────────────────────
    window._changerMembership = async (id, type) => {
      try { await updateDoc(doc(db, "members", id), { membershipType: type }); }
      catch (e) { alert("Erreur : " + e.message); }
    };

    // ── Recherche live ───────────────────────────────────────
    document.getElementById("search-membres").addEventListener("input", function() {
      const q = this.value.toLowerCase();
      const filtres = q
        ? tousMembres.filter(m =>
            (m.prenom + " " + m.nom).toLowerCase().includes(q) ||
            (m.email   || "").toLowerCase().includes(q) ||
            (m.pays    || "").toLowerCase().includes(q) ||
            (m.secteur || "").toLowerCase().includes(q)
          )
        : tousMembres;
      afficher(filtres);
    });

    // ── Init ─────────────────────────────────────────────────
    requireAdmin(async (user, role) => {
      majSidebarUser(sessionStorage.getItem("cielf_admin_nom") || user.email, role);
      await charger();
    });
  </script>
</body>
</html>
