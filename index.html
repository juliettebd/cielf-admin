<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIELF Admin — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal:   #13686b;
      --wine:   #861b3f;
      --purple: #ccadb5;
      --cream:  #fafaf2;
      --cyan:   #82adad;
      --dark:   #2c2c2c;
      --mid:    #666;
      --light:  #f0f0f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-wrap {
      width: 100%;
      max-width: 440px;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
      padding: 48px 40px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 8px;
    }
    .login-logo img {
      height: 56px;
      width: auto;
    }
    .login-subtitle {
      text-align: center;
      font-size: 12px;
      font-weight: 800;
      color: var(--wine);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .login-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--teal);
      text-align: center;
      margin-bottom: 6px;
    }
    .login-desc {
      font-size: 14px;
      color: var(--mid);
      text-align: center;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      color: var(--dark);
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(19,104,107,0.12);
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--wine);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .btn-login:hover { background: #6b1532; }
    .btn-login:disabled { background: var(--purple); cursor: not-allowed; }
    .msg-erreur {
      display: none;
      background: #fdf0f3;
      border: 1px solid var(--wine);
      border-radius: 8px;
      padding: 10px 14px;
      margin-top: 16px;
      font-size: 14px;
      font-weight: 600;
      color: var(--wine);
      text-align: center;
    }
    .msg-erreur.visible { display: block; }
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--cyan);
    }
    @media (max-width: 480px) {
      .login-card { padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <img src="https://d1yei2z3i6k35z.cloudfront.net/15057727/69137015368ee_CIELFlogocrop.png" alt="CIELF">
      </div>
      <div class="login-subtitle">Tableau de bord</div>
      <div class="login-title">Espace administration</div>
      <div class="login-desc">Accès réservé à l'équipe CIELF</div>

      <div class="form-group">
        <label for="admin-email">Adresse email</label>
        <input type="email" id="admin-email" placeholder="votre@cielf.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="admin-mdp">Mot de passe</label>
        <input type="password" id="admin-mdp" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-login" id="btn-login">Accéder au tableau de bord</button>
      <div class="msg-erreur" id="msg-erreur"></div>
    </div>
    <div class="login-footer">CIELF ASBL · contact@cielf.com</div>
  </div>

  <script type="module">
    import { initializeApp }             from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyD7JCajQFLChA-1qa-_QfuadAeKlrb58ek",
      authDomain:        "cielf-membres.firebaseapp.com",
      projectId:         "cielf-membres",
      storageBucket:     "cielf-membres.firebasestorage.app",
      messagingSenderId: "534062662676",
      appId:             "1:534062662676:web:eab7dbe36db86716195301"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    const inputEmail = document.getElementById("admin-email");
    const inputMdp   = document.getElementById("admin-mdp");
    const btnLogin   = document.getElementById("btn-login");
    const msgErreur  = document.getElementById("msg-erreur");

    function afficherErreur(txt) {
      msgErreur.textContent = txt;
      msgErreur.classList.add("visible");
    }
    function cacherErreur() {
      msgErreur.classList.remove("visible");
    }

    btnLogin.addEventListener("click", async () => {
      const email = inputEmail.value.trim();
      const mdp   = inputMdp.value;
      cacherErreur();

      if (!email || !mdp) {
        afficherErreur("Veuillez remplir votre email et votre mot de passe.");
        return;
      }

      btnLogin.disabled     = true;
      btnLogin.textContent  = "Connexion en cours...";

      try {
        const cred = await signInWithEmailAndPassword(auth, email, mdp);

        // Vérification que l'utilisateur est bien dans la collection admins
        const adminDoc = await getDoc(doc(db, "admins", cred.user.uid));
        if (!adminDoc.exists()) {
          await auth.signOut();
          afficherErreur("Accès non autorisé. Cet espace est réservé à l'équipe CIELF.");
          btnLogin.disabled    = false;
          btnLogin.textContent = "Accéder au tableau de bord";
          return;
        }

        // Stocke le rôle en sessionStorage pour éviter une requête Firestore à chaque page
        sessionStorage.setItem("cielf_admin_role",  adminDoc.data().role);
        sessionStorage.setItem("cielf_admin_email", email);
        sessionStorage.setItem("cielf_admin_nom",   adminDoc.data().prenom || email);

        window.location.href = "dashboard.html";

      } catch (err) {
        btnLogin.disabled    = false;
        btnLogin.textContent = "Accéder au tableau de bord";
        if (["auth/user-not-found","auth/wrong-password","auth/invalid-credential"].includes(err.code)) {
          afficherErreur("Email ou mot de passe incorrect.");
        } else if (err.code === "auth/too-many-requests") {
          afficherErreur("Trop de tentatives. Patientez quelques minutes.");
        } else {
          afficherErreur("Une erreur est survenue. Veuillez réessayer.");
        }
      }
    });

    // Touche Entrée pour valider
    inputMdp.addEventListener("keydown",   e => { if (e.key === "Enter") btnLogin.click(); });
    inputEmail.addEventListener("keydown", e => { if (e.key === "Enter") inputMdp.focus(); });
  </script>
</body>
</html>
