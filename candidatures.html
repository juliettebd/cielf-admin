<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIELF Admin — Candidatures</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --teal:#13686b; --wine:#861b3f; --purple:#ccadb5; --cream:#fafaf2; --cyan:#82adad; --dark:#2c2c2c; --mid:#666; --sidebar-w:240px; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Nunito',sans-serif; background:var(--cream); color:var(--dark); min-height:100vh; }

    /* ── SIDEBAR (styles partagés) ── */
    .sidebar { position:fixed; top:0; left:0; width:var(--sidebar-w); height:100vh; background:var(--teal); display:flex; flex-direction:column; z-index:100; overflow-y:auto; }
    .sidebar-logo { padding:28px 24px 20px; border-bottom:1px solid rgba(255,255,255,0.15); }
    .sidebar-logo img { height:40px; }
    .sidebar-badge { display:block; margin-top:8px; font-size:10px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,255,255,0.7); }
    .sidebar-user { padding:16px 24px; border-bottom:1px solid rgba(255,255,255,0.15); }
    .sidebar-user-nom { font-size:13px; font-weight:700; color:#fff; }
    .sidebar-user-role { font-size:11px; color:rgba(255,255,255,0.6); margin-top:2px; }
    .sidebar-nav { flex:1; padding:16px 0; }
    .nav-section { padding:8px 24px 4px; font-size:10px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,255,255,0.45); }
    .nav-item { display:flex; align-items:center; gap:10px; padding:10px 24px; font-size:14px; font-weight:600; color:rgba(255,255,255,0.85); text-decoration:none; transition:background 0.15s; cursor:pointer; border:none; background:none; width:100%; text-align:left; }
    .nav-item:hover { background:rgba(255,255,255,0.1); color:#fff; }
    .nav-item.active { background:rgba(255,255,255,0.18); color:#fff; font-weight:800; }
    .nav-icon { font-size:16px; width:20px; text-align:center; }
    .nav-item-disabled { opacity:0.4; cursor:not-allowed; pointer-events:none; }
    .nav-soon { margin-left:auto; font-size:9px; font-weight:700; color:rgba(255,255,255,0.5); }
    .sidebar-bottom { padding:16px 24px; border-top:1px solid rgba(255,255,255,0.15); }
    .btn-deconnexion { width:100%; padding:10px; background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.8); border:1px solid rgba(255,255,255,0.2); border-radius:8px; font-family:'Nunito',sans-serif; font-size:13px; font-weight:700; cursor:pointer; }
    .btn-deconnexion:hover { background:rgba(255,255,255,0.2); color:#fff; }

    /* ── LAYOUT ── */
    .main { margin-left:var(--sidebar-w); min-height:100vh; padding:32px; }
    .main-header { margin-bottom:28px; }
    .main-header h1 { font-size:22px; font-weight:800; color:var(--teal); }
    .main-header p { font-size:14px; color:var(--mid); margin-top:4px; }

    /* ── CANDIDATURES ── */
    .cand-list { display:flex; flex-direction:column; gap:12px; }
    .cand-card { background:#fff; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.06); padding:20px 24px; display:grid; grid-template-columns:1fr auto; gap:16px; align-items:start; }
    .cand-nom { font-size:16px; font-weight:800; color:var(--dark); margin-bottom:4px; }
    .cand-meta { font-size:13px; color:var(--mid); margin-bottom:10px; }
    .cand-infos { display:flex; gap:16px; flex-wrap:wrap; font-size:12px; color:var(--mid); }
    .badge-statut { display:inline-block; font-size:10px; font-weight:800; padding:3px 10px; border-radius:10px; text-transform:uppercase; letter-spacing:0.5px; }
    .statut-attente  { background:#fff8e1; color:#c47a1e; }
    .statut-visio    { background:#e3f2fd; color:#1565c0; }
    .statut-accepte  { background:#e8f5e9; color:#2e7d32; }
    .statut-refuse   { background:#fce4ec; color:#880e4f; }
    .statut-select { padding:8px 12px; border:1.5px solid #ddd; border-radius:8px; font-family:'Nunito',sans-serif; font-size:13px; font-weight:700; cursor:pointer; background:#fff; color:var(--dark); }
    .statut-select:focus { outline:none; border-color:var(--teal); }
    .btn-voir { margin-top:8px; width:100%; padding:8px; background:var(--cream); color:var(--teal); border:1.5px solid var(--teal); border-radius:6px; font-family:'Nunito',sans-serif; font-size:12px; font-weight:700; cursor:pointer; }
    .btn-voir:hover { background:var(--teal); color:#fff; }

    /* ── MODAL DOSSIER ── */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:500; align-items:flex-start; justify-content:center; padding:24px; overflow-y:auto; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:#fff; border-radius:16px; width:100%; max-width:680px; padding:36px 32px; margin:auto; box-shadow:0 8px 40px rgba(0,0,0,0.18); }
    .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
    .modal-header h2 { font-size:18px; font-weight:800; color:var(--teal); }
    .btn-close { background:none; border:none; font-size:22px; cursor:pointer; color:var(--mid); }
    .btn-close:hover { color:var(--wine); }
    .dossier-section { margin-bottom:16px; }
    .dossier-label { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:var(--mid); margin-bottom:6px; }
    .dossier-value { font-size:14px; color:var(--dark); line-height:1.6; }
    .dossier-divider { border:none; border-top:1px solid #eee; margin:16px 0; }

    /* ── ÉTATS VIDES ── */
    .empty-state { text-align:center; padding:60px 20px; color:var(--mid); }
    .empty-icon { font-size:48px; margin-bottom:12px; }

    /* ── MOBILE ── */
    .menu-toggle { display:none; position:fixed; top:16px; left:16px; z-index:200; background:var(--teal); color:#fff; border:none; border-radius:8px; width:40px; height:40px; font-size:20px; cursor:pointer; align-items:center; justify-content:center; }
    .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:99; }
    @media (max-width:768px) {
      .menu-toggle { display:flex; }
      .sidebar { transform:translateX(-100%); transition:transform 0.25s; }
      .sidebar.open { transform:translateX(0); }
      .sidebar-overlay.open { display:block; }
      .main { margin-left:0; padding:72px 16px 24px; }
      .cand-card { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

  <button class="menu-toggle" id="menu-toggle">☰</button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Sidebar chargée dynamiquement depuis sidebar.html -->
  <div id="sidebar-container"></div>

  <main class="main">
    <div class="main-header">
      <h1>📋 Candidatures</h1>
      <p>Dossiers soumis via cielf.com/candidature (collection pending_members)</p>
    </div>
    <div class="cand-list" id="cand-list">
      <div class="empty-state"><div class="empty-icon">⏳</div><p>Chargement...</p></div>
    </div>
  </main>

  <!-- Modal dossier complet -->
  <div class="modal-overlay" id="modal-dossier">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modal-nom-cand">Dossier candidature</h2>
        <button class="btn-close" id="btn-close-dossier">✕</button>
      </div>
      <div id="modal-contenu-dossier"></div>
    </div>
  </div>

  <script type="module">
    import { requireAdmin, db }               from "./cielf-admin-auth.js";
    import { chargerSidebar, majSidebarUser } from "./cielf-sidebar.js";
    import { collection, getDocs, doc, updateDoc }
      from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    await chargerSidebar();

    const candList    = document.getElementById("cand-list");
    const modalDossier = document.getElementById("modal-dossier");

    document.getElementById("btn-close-dossier").addEventListener("click", () => modalDossier.classList.remove("open"));
    modalDossier.addEventListener("click", e => { if (e.target === modalDossier) modalDossier.classList.remove("open"); });

    let toutes = [];

    async function charger() {
      try {
        const snap = await getDocs(collection(db, "pending_members"));
        toutes = snap.docs.map(d => ({ id: d.id, ...d.data() }));

        if (toutes.length === 0) {
          candList.innerHTML = "<div class='empty-state'><div class='empty-icon'>✅</div><p>Aucune candidature en attente.</p></div>";
          return;
        }

        const classeStatut = { "En attente":"statut-attente", "Visio planifiée":"statut-visio", "Accepté":"statut-accepte", "Refusé":"statut-refuse" };

        candList.innerHTML = toutes.map(c => {
          const sc = classeStatut[c.statut] || "statut-attente";
          const dateStr = c.createdAt?.toDate ? c.createdAt.toDate().toLocaleDateString("fr-BE") : "";
          const options = ["En attente","Visio planifiée","Accepté","Refusé"]
            .map(s => "<option value='" + s + "'" + (c.statut === s ? " selected" : "") + ">" + s + "</option>")
            .join("");

          return "<div class='cand-card'>"
            + "<div>"
            +   "<div class='cand-nom'>" + (c.prenom || "") + " " + (c.nom || "")
            +     " <span class='badge-statut " + sc + "'>" + (c.statut || "En attente") + "</span></div>"
            +   "<div class='cand-meta'>" + (c.nomEntreprise || "") + (c.pays ? " · " + c.pays : "") + "</div>"
            +   "<div class='cand-infos'>"
            +     "<span>📧 " + (c.email || "") + "</span>"
            +     (c.secteur ? "<span>💼 " + c.secteur + "</span>" : "")
            +     (dateStr   ? "<span>📅 " + dateStr   + "</span>" : "")
            +   "</div>"
            +   "<button class='btn-voir' onclick='window._voirDossier(\"" + c.id + "\")'>Voir le dossier complet</button>"
            + "</div>"
            + "<div>"
            +   "<select class='statut-select' onchange='window._changerStatut(\"" + c.id + "\", this.value)'>" + options + "</select>"
            + "</div>"
            + "</div>";
        }).join("");

      } catch (err) {
        candList.innerHTML = "<div class='empty-state'><div class='empty-icon'>⚠️</div><p>Erreur : " + err.message + "</p></div>";
      }
    }

    window._changerStatut = async (id, statut) => {
      try {
        await updateDoc(doc(db, "pending_members", id), { statut });
      } catch (e) {
        alert("Erreur mise à jour statut : " + e.message);
      }
    };

    window._voirDossier = id => {
      const c = toutes.find(x => x.id === id);
      if (!c) return;

      document.getElementById("modal-nom-cand").textContent = (c.prenom || "") + " " + (c.nom || "");

      const champs = [
        { label:"Email",                  val: c.email },
        { label:"Téléphone",              val: c.telephone },
        { label:"Pays / Ville",           val: [c.pays, c.ville].filter(Boolean).join(" — ") },
        { label:"Entreprise",             val: c.nomEntreprise },
        { label:"Secteur",                val: c.secteur },
        { label:"Ancienneté",             val: c.anciennete },
        { label:"Site web",               val: c.siteWeb },
        { label:"LinkedIn",               val: c.linkedin },
        { label:"Description business",   val: c.descriptionBusiness },
        { label:"Vision internationale",  val: c.visionInternationale },
        { label:"Pays visés",             val: c.paysVises },
        { label:"Pourquoi CIELF",         val: c.pourquoiCIELF },
        { label:"Apport à la communauté", val: c.apport },
        { label:"Valeur CIELF",           val: c.valeur },
        { label:"Source",                 val: c.source },
      ].filter(f => f.val);

      document.getElementById("modal-contenu-dossier").innerHTML = champs.map(f =>
        "<div class='dossier-section'>"
        + "<div class='dossier-label'>" + f.label + "</div>"
        + "<div class='dossier-value'>" + f.val + "</div>"
        + "</div><hr class='dossier-divider'>"
      ).join("");

      modalDossier.classList.add("open");
    };

    requireAdmin(async (user, role) => {
      majSidebarUser(sessionStorage.getItem("cielf_admin_nom") || user.email, role);
      await charger();
    });
  </script>
</body>
</html>
